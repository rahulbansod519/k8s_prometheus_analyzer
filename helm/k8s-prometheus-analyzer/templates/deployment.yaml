{{- if .Values.daemon }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-prometheus-analyzer.fullname" . }}
  labels:
    {{- include "k8s-prometheus-analyzer.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "k8s-prometheus-analyzer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "k8s-prometheus-analyzer.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.exporter.serviceMonitor.enabled }}
        # Expose annotations only if ServiceMonitor is disabled
        {{- else if .Values.exporter.service.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.exporter.port | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "k8s-prometheus-analyzer.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: analyzer
          image: "{{ .Values.image.repository }}:{{ include "k8s-prometheus-analyzer.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command:
            - k8s-analyze
            - --config
            - /config/config.yaml
          ports:
            - name: http-metrics
              containerPort: {{ .Values.exporter.port }}
              protocol: TCP
          env:
            {{- if .Values.prometheus.auth.tokenSecretRef }}
            - name: K8S_ANALYZER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.prometheus.auth.tokenSecretRef.name }}
                  key: {{ .Values.prometheus.auth.tokenSecretRef.key }}
            {{- end }}
            {{- if .Values.alerts.slack.webhookUrlSecretRef }}
            - name: K8S_ANALYZER_ALERTS_SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.alerts.slack.webhookUrlSecretRef.name }}
                  key: {{ .Values.alerts.slack.webhookUrlSecretRef.key }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "k8s-prometheus-analyzer.fullname" . }}-config
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
