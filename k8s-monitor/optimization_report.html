<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>k8s-prometheus-analyzer — Optimisation Report</title>
  <meta name="description" content="Kubernetes resource optimisation recommendations generated by k8s-prometheus-analyzer">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & tokens ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #070b14;
      --bg-2:         #0d1220;
      --glass:        rgba(255,255,255,0.04);
      --glass-hover:  rgba(255,255,255,0.07);
      --border:       rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.16);
      --text:         #e2e8f0;
      --text-dim:     #94a3b8;
      --text-muted:   #475569;
      --critical:     #ef4444;
      --critical-bg:  rgba(239,68,68,0.12);
      --critical-bdr: rgba(239,68,68,0.35);
      --warning:      #f59e0b;
      --warning-bg:   rgba(245,158,11,0.12);
      --warning-bdr:  rgba(245,158,11,0.35);
      --info:         #22c55e;
      --info-bg:      rgba(34,197,94,0.12);
      --info-bdr:     rgba(34,197,94,0.35);
      --accent:       #6366f1;
      --accent-glow:  rgba(99,102,241,0.25);
      --radius:       14px;
      --radius-sm:    8px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ──────────────────────────────────────────────────────── */
    .app { max-width: 1440px; margin: 0 auto; padding: 28px 24px; }

    /* ── Header ──────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      padding: 20px 28px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(16px);
      margin-bottom: 28px;
      animation: fadeDown 0.5s ease both;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .header h1 {
      font-size: 1.25rem; font-weight: 700;
      background: linear-gradient(135deg, #e2e8f0 30%, #6366f1);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-subtitle { font-size: 0.78rem; color: var(--text-muted); margin-top: 1px; }
    .header-meta { text-align: right; font-size: 0.78rem; color: var(--text-muted); line-height: 1.8; }
    .header-meta a { color: var(--accent); text-decoration: none; }
    .header-meta a:hover { text-decoration: underline; }

    /* ── Stats grid ──────────────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      padding: 22px 24px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      animation: slideUp 0.5s ease both;
      position: relative;
      overflow: hidden;
    }
    .stat-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 80% 20%, var(--glow-color, transparent) 0%, transparent 60%);
      pointer-events: none;
    }
    .stat-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      border-color: var(--border-hover);
    }
    .stat-card.critical { border-color: var(--critical-bdr); --glow-color: rgba(239,68,68,0.1); }
    .stat-card.warning  { border-color: var(--warning-bdr);  --glow-color: rgba(245,158,11,0.1); }
    .stat-card.info     { border-color: var(--info-bdr);     --glow-color: rgba(34,197,94,0.1); }
    .stat-card.total    { border-color: rgba(99,102,241,0.4);--glow-color: rgba(99,102,241,0.1); }
    .stat-card:nth-child(1) { animation-delay: 0.05s; }
    .stat-card:nth-child(2) { animation-delay: 0.10s; }
    .stat-card:nth-child(3) { animation-delay: 0.15s; }
    .stat-card:nth-child(4) { animation-delay: 0.20s; }
    .stat-icon { font-size: 1.6rem; margin-bottom: 8px; line-height: 1; }
    .stat-value {
      font-size: 2.8rem; font-weight: 700; line-height: 1;
      margin-bottom: 4px; letter-spacing: -0.02em;
    }
    .stat-card.critical .stat-value { color: var(--critical); }
    .stat-card.warning  .stat-value { color: var(--warning); }
    .stat-card.info     .stat-value { color: var(--info); }
    .stat-card.total    .stat-value { color: var(--accent); }
    .stat-label {
      font-size: 0.72rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    /* ── Overview (chart + summary) ──────────────────────────────────── */
    .overview {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 16px;
      margin-bottom: 24px;
      align-items: stretch;
    }
    .glass-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      padding: 24px;
      animation: fadeIn 0.6s ease both;
    }
    .card-title {
      font-size: 0.72rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    /* Donut chart */
    .donut-wrap {
      display: flex;
      align-items: center;
      gap: 28px;
    }
    .donut-svg { flex-shrink: 0; }
    .legend { display: flex; flex-direction: column; gap: 12px; }
    .legend-row {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.875rem;
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { color: var(--text-dim); flex: 1; }
    .legend-val { font-weight: 600; font-size: 1rem; }

    /* Top-suggestions summary card */
    .summary-card { display: flex; flex-direction: column; gap: 10px; }
    .summary-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.82rem;
    }
    .summary-item-icon { font-size: 1.1rem; flex-shrink: 0; }
    .summary-item-text { color: var(--text-dim); line-height: 1.4; }

    /* ── Filters ─────────────────────────────────────────────────────── */
    .filters {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      animation: fadeIn 0.5s ease both;
    }
    .filter-label { font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }
    select, .search-input {
      padding: 8px 12px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.82rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    select:focus, .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    select option { background: #0d1220; }
    .search-input { flex: 1; min-width: 220px; cursor: text; }
    .search-input::placeholder { color: var(--text-muted); }
    .result-count {
      margin-left: auto;
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── Table ───────────────────────────────────────────────────────── */
    .table-wrap {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeIn 0.7s ease both;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    thead { background: rgba(255,255,255,0.04); position: sticky; top: 0; z-index: 1; }
    th {
      padding: 13px 16px;
      text-align: left;
      font-size: 0.72rem; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      cursor: pointer; user-select: none; white-space: nowrap;
      transition: color 0.2s;
      border-bottom: 1px solid var(--border);
    }
    th:hover { color: var(--text-dim); }
    th.sorted { color: var(--accent); }
    .sort-icon { margin-left: 4px; opacity: 0.4; font-size: 0.65rem; }
    th.sorted .sort-icon { opacity: 1; }
    td {
      padding: 13px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }
    tr.data-row { cursor: pointer; transition: background 0.15s; }
    tr.data-row:hover td { background: var(--glass-hover); }
    tr.data-row:last-child td { border-bottom: none; }

    /* Expanded detail row */
    tr.exp-row td { padding: 0; border-bottom: none; }
    .exp-content {
      padding: 16px 16px 20px 56px;
      background: rgba(0,0,0,0.25);
      border-bottom: 1px solid var(--border);
    }
    .exp-section-title {
      font-size: 0.7rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 8px; margin-top: 12px;
    }
    .exp-section-title:first-child { margin-top: 0; }
    .pod-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .pod-tag {
      padding: 3px 9px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 5px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.73rem; color: var(--text-dim);
    }
    .reason-list { list-style: none; }
    .reason-list li {
      font-size: 0.8rem; color: var(--text-dim); padding: 2px 0;
      display: flex; gap: 8px;
    }
    .reason-list li::before { content: '→'; color: var(--text-muted); flex-shrink: 0; }

    /* Cell elements */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 0.72rem; font-weight: 700;
      white-space: nowrap; letter-spacing: 0.03em;
    }
    .badge.critical { background: var(--critical-bg); color: var(--critical); border: 1px solid var(--critical-bdr); }
    .badge.warning  { background: var(--warning-bg);  color: var(--warning);  border: 1px solid var(--warning-bdr); }
    .badge.info     { background: var(--info-bg);     color: var(--info);     border: 1px solid var(--info-bdr); }

    .kind-tag {
      display: inline-block; padding: 2px 7px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.7rem; color: var(--text-muted);
      margin-left: 6px; vertical-align: middle;
    }
    .ns-tag {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.78rem; color: var(--text-dim);
    }
    .metric-val { font-weight: 600; font-size: 0.9rem; }
    .metric-pct { font-size: 0.73rem; color: var(--text-muted); display: block; margin-top: 1px; }
    .mini-bar-wrap { display: block; width: 64px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-top: 4px; }
    .mini-bar { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
    .suggestion-list { list-style: none; }
    .suggestion-list li { font-size: 0.78rem; color: var(--text-dim); line-height: 1.5; }
    .suggestion-list li::before { content: '• '; color: var(--text-muted); }

    .expand-btn {
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      font-size: 0.65rem; color: var(--text-muted);
      transition: transform 0.2s ease, background 0.2s;
      flex-shrink: 0;
    }
    .expand-btn.open { transform: rotate(90deg); background: var(--accent); color: #fff; }

    /* All-clear view */
    .all-clear {
      text-align: center; padding: 80px 32px;
    }
    .all-clear-icon { font-size: 4rem; margin-bottom: 16px; }
    .all-clear h2 { font-size: 1.5rem; font-weight: 700; color: var(--info); margin-bottom: 8px; }
    .all-clear p { color: var(--text-muted); font-size: 0.9rem; }

    /* No-results inline */
    .no-results { text-align: center; padding: 56px 32px; }
    .no-results p { color: var(--text-muted); font-size: 0.9rem; }

    /* ── Footer ──────────────────────────────────────────────────────── */
    .footer {
      margin-top: 32px; padding: 20px;
      text-align: center;
      font-size: 0.75rem; color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
    .footer a { color: var(--accent); text-decoration: none; }

    /* ── Animations ──────────────────────────────────────────────────── */
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .overview   { grid-template-columns: 1fr; }
      .header     { flex-direction: column; text-align: center; }
      .header-meta { text-align: center; }
    }
    @media (max-width: 640px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .app { padding: 16px 12px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="header-logo">☸</div>
      <div>
        <h1>k8s-prometheus-analyzer</h1>
        <div class="header-subtitle">Resource Optimisation Report</div>
      </div>
    </div>
    <div class="header-meta" id="header-meta">
      <!-- filled by JS -->
    </div>
  </header>

  <!-- Stat cards -->
  <div class="stats-grid" id="stats-grid">
    <!-- filled by JS -->
  </div>

  <!-- Overview: donut chart + suggestions summary -->
  <div class="overview" id="overview-section">
    <div class="glass-card">
      <div class="card-title">Severity Breakdown</div>
      <div class="donut-wrap">
        <div id="donut-container"></div>
        <div class="legend" id="donut-legend"></div>
      </div>
    </div>
    <div class="glass-card">
      <div class="card-title">Top Suggestions</div>
      <div class="summary-card" id="top-suggestions"></div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters" id="filter-bar">
    <span class="filter-label">Filter:</span>
    <select id="sev-filter" title="Filter by severity">
      <option value="all">All severities</option>
      <option value="critical">🔴 Critical</option>
      <option value="warning">🟡 Warning</option>
      <option value="info">🟢 Info</option>
    </select>
    <select id="ns-filter" title="Filter by namespace">
      <option value="all">All namespaces</option>
    </select>
    <input class="search-input" id="search" type="search" placeholder="🔍  Search workloads, namespaces, suggestions…">
    <span class="result-count" id="result-count"></span>
  </div>

  <!-- Table -->
  <div class="table-wrap" id="table-section">
    <table>
      <thead>
        <tr>
          <th data-sort="severity">Severity <span class="sort-icon">↕</span></th>
          <th data-sort="namespace">Namespace <span class="sort-icon">↕</span></th>
          <th data-sort="workload">Workload <span class="sort-icon">↕</span></th>
          <th data-sort="replicas" style="text-align:center">Reps <span class="sort-icon">↕</span></th>
          <th data-sort="cpu">CPU/pod <span class="sort-icon">↕</span></th>
          <th data-sort="mem">Mem/pod <span class="sort-icon">↕</span></th>
          <th>Suggestions</th>
          <th style="width:40px"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <!-- Footer -->
  <footer class="footer" id="footer">
    <!-- filled by JS -->
  </footer>

</div>

<script>
  // ── Embedded data ─────────────────────────────────────────────────────────
  const DATA = {"generated_at": "2026-05-24T04:49:21Z", "prometheus_url": "http://prom:9090", "total": 0, "critical": 0, "warning": 0, "info": 0, "recommendations": []};

  // ── Constants ─────────────────────────────────────────────────────────────
  const SEV_ORDER = { critical: 0, warning: 1, info: 2 };
  const SEV_ICON  = { critical: '🔴', warning: '🟡', info: '🟢' };
  const SEV_COLOR = { critical: '#ef4444', warning: '#f59e0b', info: '#22c55e' };

  // ── State ─────────────────────────────────────────────────────────────────
  const state = {
    sev: 'all', ns: 'all', search: '',
    sortCol: 'severity', sortAsc: true,
    expanded: new Set(),
  };

  // ── Header ────────────────────────────────────────────────────────────────
  function renderHeader() {
    const ts = new Date(DATA.generated_at).toUTCString().replace(' GMT', ' UTC');
    const urlPart = DATA.prometheus_url
      ? `<a href="${DATA.prometheus_url}" target="_blank" rel="noopener">${DATA.prometheus_url}</a>`
      : '—';
    document.getElementById('header-meta').innerHTML =
      `<div>Generated: ${ts}</div><div>Prometheus: ${urlPart}</div>`;
    document.title = `k8s-analyzer — ${DATA.total} issue${DATA.total !== 1 ? 's' : ''} found`;
  }

  // ── Stat cards ────────────────────────────────────────────────────────────
  function renderStats() {
    const cards = [
      { cls: 'total',    icon: '📊', val: DATA.total,    label: 'Total Issues' },
      { cls: 'critical', icon: '🔴', val: DATA.critical, label: 'Critical' },
      { cls: 'warning',  icon: '🟡', val: DATA.warning,  label: 'Warning' },
      { cls: 'info',     icon: '🟢', val: DATA.info,     label: 'Info' },
    ];
    document.getElementById('stats-grid').innerHTML = cards.map(c =>
      `<div class="stat-card ${c.cls}">
        <div class="stat-icon">${c.icon}</div>
        <div class="stat-value" data-target="${c.val}">0</div>
        <div class="stat-label">${c.label}</div>
      </div>`
    ).join('');
    animateCounters();
  }

  function animateCounters() {
    document.querySelectorAll('.stat-value[data-target]').forEach(el => {
      const target = parseInt(el.dataset.target, 10);
      if (target === 0) { el.textContent = '0'; return; }
      let n = 0;
      const step = Math.max(1, Math.ceil(target / 24));
      const id = setInterval(() => {
        n = Math.min(n + step, target);
        el.textContent = n;
        if (n >= target) clearInterval(id);
      }, 32);
    });
  }

  // ── Donut chart (pure SVG) ────────────────────────────────────────────────
  function renderDonut() {
    const total = DATA.critical + DATA.warning + DATA.info;
    if (total === 0) {
      document.getElementById('donut-container').innerHTML =
        `<div style="width:160px;height:160px;display:flex;align-items:center;justify-content:center;font-size:3rem;">✅</div>`;
      document.getElementById('donut-legend').innerHTML =
        `<div style="color:var(--info);font-weight:600">All clear!</div>`;
      return;
    }
    const R = 60, CX = 80, CY = 80;
    const C = 2 * Math.PI * R;
    const segs = [
      { val: DATA.critical, color: SEV_COLOR.critical },
      { val: DATA.warning,  color: SEV_COLOR.warning },
      { val: DATA.info,     color: SEV_COLOR.info },
    ].filter(s => s.val > 0);
    let offset = 0;
    const circles = segs.map(s => {
      const frac = s.val / total;
      const da = frac * C;
      const doff = -(offset * C);
      offset += frac;
      return `<circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="${s.color}"
        stroke-width="20" stroke-dasharray="${da} ${C}" stroke-dashoffset="${doff}"
        transform="rotate(-90 ${CX} ${CY})" style="transition:stroke-dasharray 1s ease"/>`;
    }).join('');
    document.getElementById('donut-container').innerHTML =
      `<svg width="160" height="160" viewBox="0 0 160 160" class="donut-svg">
        <circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="20"/>
        ${circles}
        <text x="${CX}" y="${CY - 7}" text-anchor="middle" fill="#e2e8f0"
          font-family="Inter,system-ui" font-size="24" font-weight="700">${total}</text>
        <text x="${CX}" y="${CY + 14}" text-anchor="middle" fill="#64748b"
          font-family="Inter,system-ui" font-size="11">issues</text>
      </svg>`;

    const rows = [
      ['critical','Critical'], ['warning','Warning'], ['info','Info'],
    ].filter(([k]) => DATA[k] > 0);
    document.getElementById('donut-legend').innerHTML = rows.map(([k, lbl]) =>
      `<div class="legend-row">
        <div class="legend-dot" style="background:${SEV_COLOR[k]}"></div>
        <span class="legend-label">${lbl}</span>
        <span class="legend-val" style="color:${SEV_COLOR[k]}">${DATA[k]}</span>
      </div>`
    ).join('');
  }

  // ── Top suggestions sidebar ───────────────────────────────────────────────
  function renderTopSuggestions() {
    const counts = {};
    DATA.recommendations.forEach(r =>
      r.suggestions.forEach(s => { counts[s] = (counts[s] || 0) + 1; })
    );
    const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0, 6);
    if (sorted.length === 0) {
      document.getElementById('top-suggestions').innerHTML =
        `<p style="color:var(--text-muted);font-size:0.85rem">No recommendations 🎉</p>`;
      return;
    }
    document.getElementById('top-suggestions').innerHTML = sorted.map(([s, n]) =>
      `<div class="summary-item">
        <span class="summary-item-icon">⚡</span>
        <span class="summary-item-text">${s} <span style="color:var(--text-muted)">(×${n})</span></span>
      </div>`
    ).join('');
  }

  // ── Namespace filter options ──────────────────────────────────────────────
  function initFilters() {
    const nss = [...new Set(DATA.recommendations.map(r => r.namespace))].sort();
    const sel = document.getElementById('ns-filter');
    nss.forEach(ns => {
      const o = document.createElement('option');
      o.value = o.textContent = ns;
      sel.appendChild(o);
    });
  }

  // ── Mini inline bar ──────────────────────────────────────────────────────
  function miniBar(pct) {
    const color = pct > 100 ? '#ef4444' : pct > 80 ? '#f59e0b' : '#22c55e';
    const w = Math.min(Math.max(pct, 0), 150) / 150 * 64;
    return `<span class="mini-bar-wrap"><span class="mini-bar" style="width:${w}px;background:${color}"></span></span>`;
  }

  // ── Table ─────────────────────────────────────────────────────────────────
  function getFiltered() {
    return DATA.recommendations.filter(r => {
      if (state.sev !== 'all' && r.severity !== state.sev) return false;
      if (state.ns  !== 'all' && r.namespace !== state.ns)  return false;
      if (state.search) {
        const q = state.search.toLowerCase();
        return r.workload_name.toLowerCase().includes(q)
          || r.namespace.toLowerCase().includes(q)
          || r.suggestions.some(s => s.toLowerCase().includes(q));
      }
      return true;
    }).sort((a, b) => {
      let av, bv;
      switch (state.sortCol) {
        case 'severity':  av = SEV_ORDER[a.severity]; bv = SEV_ORDER[b.severity]; break;
        case 'namespace': av = a.namespace;       bv = b.namespace;       break;
        case 'workload':  av = a.workload_name;   bv = b.workload_name;   break;
        case 'replicas':  av = a.replica_count;   bv = b.replica_count;   break;
        case 'cpu':       av = a.cpu_usage_pct;   bv = b.cpu_usage_pct;   break;
        case 'mem':       av = a.memory_usage_pct;bv = b.memory_usage_pct;break;
        default: return 0;
      }
      if (av < bv) return state.sortAsc ? -1 :  1;
      if (av > bv) return state.sortAsc ?  1 : -1;
      return 0;
    });
  }

  function renderTable() {
    if (DATA.total === 0) {
      document.getElementById('filter-bar').style.display = 'none';
      document.getElementById('table-section').innerHTML =
        `<div class="all-clear">
          <div class="all-clear-icon">✅</div>
          <h2>All Clear!</h2>
          <p>No resource optimisation issues were found.<br>Your cluster is well-configured.</p>
        </div>`;
      return;
    }

    const recs = getFiltered();
    document.getElementById('result-count').textContent =
      `${recs.length} of ${DATA.total} workload${DATA.total !== 1 ? 's' : ''}`;

    const tbody = document.getElementById('tbody');
    if (recs.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="no-results">
        <p>No workloads match the current filter. Try broadening your search.</p>
      </div></td></tr>`;
      return;
    }

    tbody.innerHTML = recs.map((r, i) => {
      const key = r.namespace + '/' + r.workload_name;
      const open = state.expanded.has(key);
      const expRow = open ? `
        <tr class="exp-row" id="exp-${i}">
          <td colspan="8">
            <div class="exp-content">
              ${r.pod_names.length ? `
                <div class="exp-section-title">Pods (${r.pod_names.length})</div>
                <div class="pod-list">${r.pod_names.map(p => `<span class="pod-tag">${p}</span>`).join('')}</div>
              ` : ''}
              <div class="exp-section-title">Reasons</div>
              <ul class="reason-list">${r.reasons.map(rn => `<li>${rn}</li>`).join('')}</ul>
            </div>
          </td>
        </tr>` : '';

      return `
        <tr class="data-row" onclick="toggleRow('${key}', ${i})">
          <td><span class="badge ${r.severity}">${SEV_ICON[r.severity]} ${r.severity.toUpperCase()}</span></td>
          <td><span class="ns-tag">${r.namespace}</span></td>
          <td>
            <strong>${r.workload_name}</strong>
            <span class="kind-tag">${r.workload_kind}</span>
          </td>
          <td style="text-align:center">
            <span class="metric-val">${r.replica_count}</span>
          </td>
          <td>
            <span class="metric-val">${r.cpu_usage.toFixed(2)}c</span>
            <span class="metric-pct">${r.cpu_usage_pct.toFixed(1)}%</span>
            ${miniBar(r.cpu_usage_pct)}
          </td>
          <td>
            <span class="metric-val">${r.memory_usage_mb.toFixed(0)} MB</span>
            <span class="metric-pct">${r.memory_usage_pct.toFixed(1)}%</span>
            ${miniBar(r.memory_usage_pct)}
          </td>
          <td>
            <ul class="suggestion-list">
              ${r.suggestions.map(s => `<li>${s}</li>`).join('')}
            </ul>
          </td>
          <td><div class="expand-btn ${open ? 'open' : ''}">▶</div></td>
        </tr>${expRow}`;
    }).join('');

    updateSortHeaders();
  }

  function toggleRow(key, i) {
    if (state.expanded.has(key)) state.expanded.delete(key);
    else state.expanded.add(key);
    renderTable();
  }

  function setSort(col) {
    if (state.sortCol === col) state.sortAsc = !state.sortAsc;
    else { state.sortCol = col; state.sortAsc = true; }
    renderTable();
  }

  function updateSortHeaders() {
    document.querySelectorAll('th[data-sort]').forEach(th => {
      const col = th.dataset.sort;
      th.classList.toggle('sorted', col === state.sortCol);
      th.querySelector('.sort-icon').textContent =
        col !== state.sortCol ? '↕' : (state.sortAsc ? '↑' : '↓');
    });
  }

  // ── Footer ────────────────────────────────────────────────────────────────
  function renderFooter() {
    const ts = new Date(DATA.generated_at).toUTCString().replace(' GMT', ' UTC');
    document.getElementById('footer').innerHTML =
      `k8s-prometheus-analyzer &nbsp;·&nbsp; Report generated ${ts}`;
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    renderHeader();
    renderStats();
    renderDonut();
    renderTopSuggestions();
    initFilters();
    renderTable();
    renderFooter();

    document.getElementById('sev-filter').addEventListener('change', e => {
      state.sev = e.target.value; renderTable();
    });
    document.getElementById('ns-filter').addEventListener('change', e => {
      state.ns = e.target.value; renderTable();
    });
    document.getElementById('search').addEventListener('input', e => {
      state.search = e.target.value; renderTable();
    });
    document.querySelectorAll('th[data-sort]').forEach(th =>
      th.addEventListener('click', () => setSort(th.dataset.sort))
    );
  });
</script>
</body>
</html>
